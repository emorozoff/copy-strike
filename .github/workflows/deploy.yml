name: Deploy static site to Pages

# Деплой через GitHub Actions вместо legacy-Jekyll-конвейера.
# Legacy давал случайные «Page build failed» и зависания в «building».
# Здесь — простой upload статики как есть (Jekyll не запускается вовсе),
# детерминированно и с логами.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать параллельные деплои; новый пуш отменяет предыдущий незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact (весь репозиторий как есть)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
